<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XIM POWER - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #F1F5F9; }
        .header {
            background: #043C7C;
            color: white;
            padding: 12px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo i { font-size: 24px; }
        .logo h1 { font-size: 18px; }
        .user-menu { display: flex; align-items: center; gap: 20px; }
        .user-info { text-align: right; }
        .user-name { font-weight: 600; font-size: 14px; }
        .user-role { font-size: 11px; opacity: 0.8; }
        .user-email { font-size: 10px; opacity: 0.7; }
        .logout-btn, .admin-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
        }
        .nav {
            background: white;
            padding: 0 30px;
            border-bottom: 1px solid #E2E8F0;
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }
        .nav-btn {
            padding: 12px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 500;
            color: #5A6874;
            border-bottom: 2px solid transparent;
        }
        .nav-btn:hover { color: #E6163E; }
        .nav-btn.active { color: #E6163E; border-bottom-color: #E6163E; }
        .content { padding: 20px 30px; }
        .module-pane { display: none; }
        .module-pane.active { display: block; }
        iframe {
            width: 100%;
            height: calc(100vh - 130px);
            border: none;
            border-radius: 16px;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .welcome-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #E2E8F0;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid #E2E8F0;
        }
        .stat-card i { font-size: 32px; color: #E6163E; margin-bottom: 10px; }
        .stat-card h3 { font-size: 28px; font-weight: 700; }
        @media (max-width: 900px) { .stats { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><i class="fas fa-cubes"></i><h1>XIM POWER SYSTEM</h1></div>
        <div class="user-menu">
            <div class="user-info">
                <div class="user-name" id="userName"></div>
                <div class="user-email" id="userEmail"></div>
                <div class="user-role" id="userRole"></div>
            </div>
            <button class="logout-btn" id="logoutBtn">Salir</button>
        </div>
    </div>
    <div class="nav" id="navMenu"></div>
    <div class="content">
        <div id="module-dashboard" class="module-pane active">
            <div class="welcome-card">
                <i class="fas fa-chart-line" style="font-size: 48px; color: #E6163E;"></i>
                <h2 id="welcomeMsg" style="margin: 15px 0;">Bienvenido</h2>
                <p>Selecciona un módulo para comenzar a trabajar</p>
            </div>
            <div class="stats">
                <div class="stat-card"><i class="fas fa-file-alt"></i><h3 id="statFichas">0</h3><p>Fichas procesadas</p></div>
                <div class="stat-card"><i class="fas fa-cubes"></i><h3 id="statContenedores">0</h3><p>Simulaciones 3D</p></div>
                <div class="stat-card"><i class="fas fa-server"></i><h3 id="statDatacenter">0</h3><p>Cálculos UPS</p></div>
            </div>
        </div>
        <div id="module-fichas" class="module-pane"><iframe src="modules/module-fichas/index.html"></iframe></div>
        <div id="module-contenedores" class="module-pane"><iframe src="modules/module-contenedores/index.html"></iframe></div>
        <div id="module-datacenter" class="module-pane"><iframe src="modules/module-datacenter/index.html"></iframe></div>
        <div id="module-admin" class="module-pane">
            <div class="welcome-card">
                <h2><i class="fas fa-users"></i> Administración de Usuarios</h2>
                <div id="adminUsersList" style="margin-top: 20px; text-align: left;"></div>
            </div>
        </div>
    </div>
    <script>
        const session = JSON.parse(localStorage.getItem('xim_session'));
        if (!session) window.location.href = 'index.html';
        
        document.getElementById('userName').textContent = session.name;
        document.getElementById('userEmail').textContent = session.email;
        document.getElementById('userRole').textContent = session.role === 'admin' ? 'Administrador' : session.role === 'editor' ? 'Editor' : 'Visualizador';
        document.getElementById('welcomeMsg').textContent = `Bienvenido, ${session.name}`;
        
        // Crear navegación
        const navMenu = document.getElementById('navMenu');
        const modules = [
            { id: 'dashboard', name: 'Inicio', icon: 'fa-home' },
            { id: 'fichas', name: 'Fichas Técnicas', icon: 'fa-file-alt' },
            { id: 'contenedores', name: 'Contenedores 3D', icon: 'fa-cubes' },
            { id: 'datacenter', name: 'Data Center', icon: 'fa-server' }
        ];
        
        if (session.role === 'admin') {
            modules.push({ id: 'admin', name: 'Admin Usuarios', icon: 'fa-cog' });
        }
        
        navMenu.innerHTML = modules.map(mod => `
            <button class="nav-btn" data-module="${mod.id}">
                <i class="fas ${mod.icon}"></i> ${mod.name}
            </button>
        `).join('');
        
        // Estadísticas
        let analytics = JSON.parse(localStorage.getItem('xim_analytics')) || [];
        const userAnalytics = analytics.filter(a => a.user === session.email);
        document.getElementById('statFichas').textContent = userAnalytics.filter(a => a.module === 'fichas').length;
        document.getElementById('statContenedores').textContent = userAnalytics.filter(a => a.module === 'contenedores').length;
        document.getElementById('statDatacenter').textContent = userAnalytics.filter(a => a.module === 'datacenter').length;
        
        // Admin: mostrar usuarios
        if (session.role === 'admin') {
            const users = JSON.parse(localStorage.getItem('xim_users')) || {};
            const adminList = document.getElementById('adminUsersList');
            adminList.innerHTML = `
                <table style="width:100%; border-collapse: collapse;">
                    <thead><tr style="background:#F8FAFC"><th>Usuario</th><th>Email</th><th>Rol</th><th>Registro</th><th></th></tr></thead>
                    <tbody>
                        ${Object.entries(users).map(([email, user]) => `
                            <tr style="border-bottom:1px solid #E2E8F0">
                                <td style="padding:10px">${user.name}</td>
                                <td style="padding:10px">${email}</td>
                                <td style="padding:10px">${user.role === 'admin' ? 'Administrador' : user.role === 'editor' ? 'Editor' : 'Visualizador'}</td>
                                <td style="padding:10px">${new Date(user.createdAt).toLocaleDateString() || '-'}</td>
                                <td style="padding:10px">${email !== session.email ? `<button onclick="deleteUser('${email}')" style="background:#FEF2F2; color:#DC2626; border:none; padding:4px 10px; border-radius:6px; cursor:pointer">Eliminar</button>` : ''}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }
        
        function deleteUser(email) {
            if (confirm(`¿Eliminar usuario ${email}?`)) {
                let users = JSON.parse(localStorage.getItem('xim_users')) || {};
                delete users[email];
                localStorage.setItem('xim_users', JSON.stringify(users));
                location.reload();
            }
        }
        window.deleteUser = deleteUser;
        
        // Navegación
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const module = btn.dataset.module;
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.module-pane').forEach(pane => pane.classList.remove('active'));
                document.getElementById(`module-${module}`).classList.add('active');
                
                if (module !== 'dashboard' && module !== 'admin') {
                    analytics.push({ user: session.email, action: 'view', module: module, timestamp: new Date().toISOString() });
                    localStorage.setItem('xim_analytics', JSON.stringify(analytics));
                }
            });
        });
        
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('xim_session');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
