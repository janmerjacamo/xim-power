<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XIM POWER - Portal de Usuarios</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0A1E3C 0%, #043C7C 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .login-header {
            background: #043C7C;
            padding: 30px;
            text-align: center;
            color: white;
        }
        .login-header i { font-size: 48px; margin-bottom: 15px; }
        .login-header h1 { font-size: 24px; margin-bottom: 5px; }
        .login-header p { font-size: 13px; opacity: 0.8; }
        .login-body { padding: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 12px; font-weight: 500; color: #5A6874; margin-bottom: 8px; }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #E2E8F0;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
        }
        .form-group input:focus { outline: none; border-color: #E6163E; box-shadow: 0 0 0 3px rgba(230,22,62,0.1); }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #E6163E;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-login:hover { background: #c41236; }
        .register-link { text-align: center; margin-top: 20px; font-size: 13px; color: #7E8C9A; }
        .register-link a { color: #E6163E; text-decoration: none; font-weight: 500; }
        .alert { padding: 12px; border-radius: 10px; margin-bottom: 20px; font-size: 13px; display: flex; align-items: center; gap: 10px; }
        .alert-error { background: #FEF2F2; color: #DC2626; border-left: 3px solid #DC2626; }
        .alert-success { background: #ECFDF5; color: #065F46; border-left: 3px solid #10B981; }
        .demo-info {
            margin-top: 20px;
            padding: 15px;
            background: #F8FAFC;
            border-radius: 12px;
            font-size: 12px;
            color: #5A6874;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <i class="fas fa-cubes"></i>
            <h1>XIM POWER SYSTEM</h1>
            <p>Portal de usuarios</p>
        </div>
        <div class="login-body">
            <div id="alertMsg"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Usuario</label>
                    <input type="text" id="username" placeholder="Ingresa tu usuario" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" placeholder="Ingresa tu contraseña" required>
                </div>
                <button type="submit" class="btn-login">Iniciar sesión</button>
            </form>
            <div class="register-link">
                ¿No tienes cuenta? <a href="#" id="showRegister">Regístrate aquí</a>
            </div>
            <div class="demo-info">
                Usuarios demo:<br>
                admin / admin123 | editor / editor123 | viewer / viewer123
            </div>
        </div>
    </div>
    <script>
        let users = JSON.parse(localStorage.getItem('xim_users')) || {
            'admin': { password: 'admin123', name: 'Administrador', role: 'admin', email: 'admin@ximpower.com', createdAt: new Date().toISOString() },
            'editor': { password: 'editor123', name: 'Editor', role: 'editor', email: 'editor@ximpower.com', createdAt: new Date().toISOString() },
            'viewer': { password: 'viewer123', name: 'Visualizador', role: 'viewer', email: 'viewer@ximpower.com', createdAt: new Date().toISOString() }
        };
        localStorage.setItem('xim_users', JSON.stringify(users));
        function showAlert(message, type) {
            const alertDiv = document.getElementById('alertMsg');
            alertDiv.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => { alertDiv.innerHTML = ''; }, 4000);
        }
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const user = users[username];
            if (user && user.password === password) {
                const session = { username, name: user.name, role: user.role, email: user.email, loginTime: new Date().toISOString() };
                localStorage.setItem('xim_session', JSON.stringify(session));
                let analytics = JSON.parse(localStorage.getItem('xim_analytics')) || [];
                analytics.push({ user: username, action: 'login', timestamp: new Date().toISOString() });
                localStorage.setItem('xim_analytics', JSON.stringify(analytics));
                showAlert('Inicio exitoso. Redirigiendo...', 'success');
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
            } else {
                showAlert('Usuario o contraseña incorrectos', 'error');
            }
        });
        document.getElementById('showRegister').addEventListener('click', (e) => {
            e.preventDefault();
            const username = prompt('Nombre de usuario:');
            if (!username) return;
            const password = prompt('Contraseña:');
            if (!password) return;
            const name = prompt('Nombre completo:');
            if (users[username]) { showAlert('Usuario ya existe', 'error'); return; }
            users[username] = { password, name, role: 'viewer', email: '', createdAt: new Date().toISOString() };
            localStorage.setItem('xim_users', JSON.stringify(users));
            showAlert('Usuario registrado. Ya puedes iniciar sesión.', 'success');
        });
        const session = JSON.parse(localStorage.getItem('xim_session'));
        if (session) window.location.href = 'dashboard.html';
    </script>
</body>
</html>
