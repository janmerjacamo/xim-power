<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XIM POWER - Acceso</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0A1E3C 0%, #043C7C 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .login-header {
            background: #043C7C;
            padding: 30px;
            text-align: center;
            color: white;
        }
        .login-header i { font-size: 48px; margin-bottom: 15px; }
        .login-header h1 { font-size: 24px; margin-bottom: 5px; }
        .login-body { padding: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 500; color: #5A6874; margin-bottom: 8px; }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #E2E8F0;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #E6163E;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
        }
        .btn-login:hover { background: #c41236; }
        .alert { padding: 12px; border-radius: 10px; margin-bottom: 20px; font-size: 13px; background: #FEF2F2; color: #DC2626; border-left: 3px solid #DC2626; }
        .demo-info {
            margin-top: 20px;
            padding: 12px;
            background: #F8FAFC;
            border-radius: 12px;
            font-size: 12px;
            color: #5A6874;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <i class="fas fa-cubes"></i>
            <h1>XIM POWER</h1>
            <p>Acceso al sistema</p>
        </div>
        <div class="login-body">
            <div id="alertMsg"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Usuario</label>
                    <input type="text" id="username" placeholder="Ingresa tu usuario" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" placeholder="Ingresa tu contraseña" required>
                </div>
                <button type="submit" class="btn-login">Ingresar</button>
            </form>
            <div class="demo-info">
                <i class="fas fa-info-circle"></i> Contacta al administrador para obtener tus credenciales
            </div>
        </div>
    </div>
    <script>
        let users = JSON.parse(localStorage.getItem('xim_users')) || {
            'admin': { password: 'xim2024', name: 'Administrador', role: 'admin', email: 'admin@ximpower.com' },
            'juan': { password: 'juan123', name: 'Juan Pérez', role: 'editor', email: 'juan@ximpower.com' },
            'maria': { password: 'maria123', name: 'María García', role: 'viewer', email: 'maria@ximpower.com' }
        };
        localStorage.setItem('xim_users', JSON.stringify(users));
        
        function showAlert(msg) {
            document.getElementById('alertMsg').innerHTML = `<div class="alert">${msg}</div>`;
            setTimeout(() => { document.getElementById('alertMsg').innerHTML = ''; }, 3000);
        }
        
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const user = users[username];
            
            if (user && user.password === password) {
                const session = { username, name: user.name, role: user.role, email: user.email };
                localStorage.setItem('xim_session', JSON.stringify(session));
                window.location.href = 'dashboard.html';
            } else {
                showAlert('Usuario o contraseña incorrectos');
            }
        });
        
        if (localStorage.getItem('xim_session')) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
