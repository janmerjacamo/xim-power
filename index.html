<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XIM Power System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #F1F5F9;
            min-height: 100vh;
        }
        
        /* Header profesional */
        .header {
            background: #0A1E3C;
            padding: 0 32px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo {
            height: 36px;
            width: auto;
        }
        
        .logo-text {
            color: white;
            font-weight: 600;
            font-size: 18px;
            letter-spacing: -0.3px;
        }
        
        .logo-text span {
            font-weight: 400;
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            margin-left: 8px;
        }
        
        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .version-badge {
            background: rgba(255,255,255,0.1);
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 12px;
            color: rgba(255,255,255,0.7);
            font-family: monospace;
        }
        
        /* Navegación lateral estilo dashboard */
        .app-layout {
            display: flex;
            min-height: calc(100vh - 64px);
        }
        
        /* Sidebar moderno */
        .sidebar {
            width: 260px;
            background: white;
            border-right: 1px solid #E2E8F0;
            padding: 24px 0;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 20px;
            margin: 4px 12px;
            border-radius: 8px;
            cursor: pointer;
            color: #475569;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            border: none;
            background: none;
            width: calc(100% - 24px);
            font-family: 'Inter', sans-serif;
        }
        
        .nav-item i {
            width: 20px;
            font-size: 16px;
            color: #64748B;
        }
        
        .nav-item:hover {
            background: #F8FAFC;
            color: #E6163E;
        }
        
        .nav-item:hover i {
            color: #E6163E;
        }
        
        .nav-item.active {
            background: #FEF2F0;
            color: #E6163E;
        }
        
        .nav-item.active i {
            color: #E6163E;
        }
        
        .sidebar-divider {
            height: 1px;
            background: #E2E8F0;
            margin: 16px 20px;
        }
        
        /* Contenido principal */
        .main-content {
            flex: 1;
            padding: 24px 32px;
            background: #F8FAFC;
        }
        
        .module-pane {
            display: none;
            animation: fadeIn 0.2s ease;
        }
        
        .module-pane.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Cards estilo enterprise */
        .content-card {
            background: white;
            border-radius: 12px;
            border: 1px solid #E2E8F0;
            overflow: hidden;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }
        
        .card-header {
            padding: 16px 24px;
            background: white;
            border-bottom: 1px solid #F1F5F9;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .card-header h2 {
            font-size: 16px;
            font-weight: 600;
            color: #0F172A;
        }
        
        .card-badge {
            font-size: 12px;
            padding: 4px 10px;
            background: #F1F5F9;
            border-radius: 20px;
            color: #475569;
        }
        
        .module-frame {
            width: 100%;
            height: calc(100vh - 180px);
            border: none;
            background: white;
        }
        
        /* Footer */
        .footer {
            background: white;
            border-top: 1px solid #E2E8F0;
            padding: 12px 32px;
            text-align: center;
            font-size: 12px;
            color: #64748B;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .app-layout {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                padding: 12px 0;
                border-right: none;
                border-bottom: 1px solid #E2E8F0;
                display: flex;
                overflow-x: auto;
            }
            .nav-item {
                width: auto;
                margin: 0 4px;
                white-space: nowrap;
            }
            .sidebar-divider {
                display: none;
            }
            .main-content {
                padding: 16px;
            }
            .module-frame {
                height: calc(100vh - 280px);
            }
            .header {
                padding: 0 16px;
            }
            .logo {
                height: 28px;
            }
            .logo-text {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-area">
            <img class="logo" src="https://assets.zyrosite.com/AR02KNG0MDce2bb3/logo-color-ru8SZgInKUmJZmyq.png" alt="XIM POWER">
            <div class="logo-text">
                XIM SYSTEM
                <span>enterprise</span>
            </div>
        </div>
        <div class="header-actions">
            <div class="version-badge">v2.0</div>
        </div>
    </div>
    
    <div class="app-layout">
        <aside class="sidebar">
            <button class="nav-item active" onclick="showModule('fichas')">
                <i class="fas fa-file-alt"></i>
                <span>Fichas Técnicas</span>
            </button>
            <button class="nav-item" onclick="showModule('contenedores')">
                <i class="fas fa-cubes"></i>
                <span>Calculadora de Contenedores</span>
            </button>
            <button class="nav-item" onclick="showModule('datacenter')">
                <i class="fas fa-server"></i>
                <span>Data Center & UPS</span>
            </button>
            <div class="sidebar-divider"></div>
            <div class="nav-item" style="opacity:0.5; cursor:default;">
                <i class="fas fa-chart-line"></i>
                <span>Analytics</span>
            </div>
            <div class="nav-item" style="opacity:0.5; cursor:default;">
                <i class="fas fa-cog"></i>
                <span>Configuración</span>
            </div>
        </aside>
        
        <main class="main-content">
            <div id="module-fichas" class="module-pane active">
                <div class="content-card">
                    <div class="card-header">
                        <h2><i class="fas fa-file-alt" style="margin-right: 8px; color: #E6163E;"></i> Fichas Técnicas</h2>
                        <div class="card-badge">IA integrada</div>
                    </div>
                    <iframe class="module-frame" src="modules/module-fichas/index.html"></iframe>
                </div>
            </div>
            <div id="module-contenedores" class="module-pane">
                <div class="content-card">
                    <div class="card-header">
                        <h2><i class="fas fa-cubes" style="margin-right: 8px; color: #E6163E;"></i> Calculadora de Contenedores</h2>
                        <div class="card-badge">3D visualizer</div>
                    </div>
                    <iframe class="module-frame" src="modules/module-contenedores/index.html"></iframe>
                </div>
            </div>
            <div id="module-datacenter" class="module-pane">
                <div class="content-card">
                    <div class="card-header">
                        <h2><i class="fas fa-server" style="margin-right: 8px; color: #E6163E;"></i> Data Center & UPS</h2>
                        <div class="card-badge">capacity planner</div>
                    </div>
                    <iframe class="module-frame" src="modules/module-datacenter/index.html"></iframe>
                </div>
            </div>
        </main>
    </div>
    
    <div class="footer">
        <p>XIM POWER — Plataforma integral para gestión técnica, logística e infraestructura</p>
    </div>
    
    <script>
        function showModule(moduleName) {
            document.querySelectorAll('.module-pane').forEach(pane => {
                pane.classList.remove('active');
            });
            document.getElementById('module-' + moduleName).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
